<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="DeskRelay">
  <!-- App-icon variant: cream silhouette on coral square. Use this
       for app icons and launch surfaces
       icon, and the favicon at sizes ≥ 64×64. Same ((✦)) geometry
       as logo-mark.svg, just inverted onto a coral rounded square. -->

  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="#d24e3a" />

  <!-- Left wave -->
  <path d="M 64 88 A 40 40 0 0 0 64 168"
        fill="none"
        stroke="#faf9f5"
        stroke-width="14"
        stroke-linecap="round" />

  <!-- Right wave -->
  <path d="M 192 88 A 40 40 0 0 1 192 168"
        fill="none"
        stroke="#faf9f5"
        stroke-width="14"
        stroke-linecap="round" />

  <!-- Sparkle -->
  <g stroke="#faf9f5" stroke-width="14" stroke-linecap="round">
    <line x1="128" y1="84" x2="128" y2="172" />
    <line x1="84" y1="128" x2="172" y2="128" />
    <line x1="100" y1="100" x2="156" y2="156" />
    <line x1="156" y1="100" x2="100" y2="156" />
  </g>
</svg>
