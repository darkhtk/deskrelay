<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="DeskRelay">
  <!-- Horizontal lockup: ((✦)) mark + "DeskRelay" wordmark.
       The mark reuses the same wave + sparkle geometry from
       logo-mark.svg, scaled down to fit a 200×200 left block. -->

  <!-- Mark (200×200 area on the left) -->
  <g transform="translate(20, 0) scale(0.72)">
    <path d="M 64 88 A 40 40 0 0 0 64 168"
          fill="none"
          stroke="#d24e3a"
          stroke-width="14"
          stroke-linecap="round" />
    <path d="M 192 88 A 40 40 0 0 1 192 168"
          fill="none"
          stroke="#d24e3a"
          stroke-width="14"
          stroke-linecap="round" />
    <g stroke="#d24e3a" stroke-width="14" stroke-linecap="round">
      <line x1="128" y1="84" x2="128" y2="172" />
      <line x1="84" y1="128" x2="172" y2="128" />
      <line x1="100" y1="100" x2="156" y2="156" />
      <line x1="156" y1="100" x2="100" y2="156" />
    </g>
  </g>

  <!-- Wordmark — "Remote" emphasized, "for Claude" qualifier -->
  <text x="220" y="138"
        font-family="'Tiempos Headline', 'Charter', 'Iowan Old Style', Georgia, serif"
        font-size="64"
        font-weight="600"
        fill="#2b2a26"
        letter-spacing="0">DeskRelay</text>
</svg>
