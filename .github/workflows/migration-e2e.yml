name: migration-e2e

on:
  pull_request:
    paths:
      - ".github/workflows/migration-e2e.yml"
      - "scripts/migration-e2e.ps1"
      - "packages/pc-connector-daemon/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packaged-connector-takeover:
    name: packaged connector takeover
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace deps
        shell: pwsh
        run: bun install --frozen-lockfile

      - name: Run migration E2E
        shell: pwsh
        run: .\scripts\migration-e2e.ps1
